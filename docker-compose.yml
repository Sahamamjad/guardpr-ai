services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guardpr
      POSTGRES_PASSWORD: guardpr
      POSTGRES_DB: guardpr
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Postgres is only used inside Docker network — no host port needed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardpr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://guardpr:guardpr@postgres:5432/guardpr
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REPORT_STORAGE_PATH: /app/storage/reports
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
      - ./demo:/demo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://guardpr:guardpr@postgres:5432/guardpr
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REPORT_STORAGE_PATH: /app/storage/reports
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
      - ./demo:/demo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker -l info -Q scans,celery

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
